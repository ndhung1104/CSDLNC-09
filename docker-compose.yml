services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: petcarex-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-PetCareX@2024}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - petcarex-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: petcarex-db-init
    profiles: [ "seed" ]
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./database:/scripts:ro
    environment:
      DB_PASSWORD: "${DB_PASSWORD:-PetCareX@2024}"
    networks:
      - petcarex-network
    entrypoint: [ "/bin/bash", "/scripts/init-db.sh" ]

  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: petcarex-app
    ports:
      - "54321:54321"
    volumes:
      - ./src:/app
      - /app/node_modules
    environment:
      PORT: "${PORT:-54321}"
      DB_HOST: "${DB_HOST:-mssql}"
      DB_PORT: "${DB_PORT:-1433}"
      DB_USER: "${DB_USER:-sa}"
      DB_PASSWORD: "${DB_PASSWORD:-PetCareX@2024}"
      DB_NAME: "${DB_NAME:-PETCAREX}"
      SESSION_SECRET: "${SESSION_SECRET:-petcarex-local-session-secret}"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - petcarex-network
    restart: unless-stopped

volumes:
  mssql_data:


networks:
  petcarex-network:
